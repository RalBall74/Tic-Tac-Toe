<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اللعب ضد الذكاء الاصطناعي - متوسط | Tic-Tac-Toe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #3a86ff;
            --secondary-color: #8338ec;
            --accent-color: #f9c74f;
            --light-color: #f8f9fa;
            --dark-color: #212529;
            --bg-color: #2b2d42;
            --text-color: #f8f9fa;
            --card-bg: rgba(255, 255, 255, 0.1);
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .light-mode {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --card-bg: rgba(0, 0, 0, 0.1);
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
            background-image:
                radial-gradient(circle at 25% 25%, var(--primary-color) 0%, transparent 20%),
                radial-gradient(circle at 75% 75%, var(--accent-color) 0%, transparent 20%);
            animation: bgPulse 15s infinite alternate;
        }

        @keyframes bgPulse {
            0% {
                transform: scale(1);
                opacity: 0.1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.15;
            }

            100% {
                transform: scale(1);
                opacity: 0.1;
            }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3rem);
            margin-bottom: 1rem;
            color: var(--primary-color);
            position: relative;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            border-radius: 2px;
        }

        .difficulty-info {
            background-color: var(--card-bg);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            text-align: center;
            box-shadow: var(--shadow);
            animation: slideUp 0.6s ease-out 0.3s forwards;
            opacity: 0;
            transform: translateY(20px);
            border: 1px solid rgba(249, 199, 79, 0.3);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .difficulty-level {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .difficulty-stars {
            color: var(--accent-color);
            font-size: 1.1rem;
            margin-top: 0.3rem;
        }

        .players-info {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 600px;
            margin-bottom: 2rem;
            animation: fadeIn 0.6s ease-out 0.6s forwards;
            opacity: 0;
        }

        .player {
            text-align: center;
            padding: 1rem;
            border-radius: 10px;
            width: 45%;
            background-color: var(--card-bg);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .player::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
        }

        .player.active {
            border: 2px solid var(--accent-color);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .player-human.active::before {
            background: var(--primary-color);
        }

        .player-ai.active::before {
            background: var(--accent-color);
        }

        .player-symbol {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .player-human .player-symbol {
            color: var(--primary-color);
        }

        .player-ai .player-symbol {
            color: var(--accent-color);
        }

        .player-name {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .player-score {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, minmax(70px, 100px));
            grid-template-rows: repeat(3, minmax(70px, 100px));
            gap: 10px;
            margin: 1rem 0 2rem;
            animation: scaleIn 0.6s ease-out 0.9s forwards;
            opacity: 0;
            transform: scale(0.95);
        }

        @keyframes scaleIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .cell {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .cell:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .cell.x {
            color: var(--primary-color);
        }

        .cell.o {
            color: var(--accent-color);
        }

        .cell.winner {
            animation: winPulse 0.5s infinite, winGlow 1.5s infinite alternate;
        }

        @keyframes winPulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes winGlow {
            from {
                box-shadow: 0 0 10px rgba(249, 199, 79, 0.5);
            }

            to {
                box-shadow: 0 0 20px rgba(249, 199, 79, 0.8);
            }
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            animation: fadeIn 0.6s ease-out 1.2s forwards;
            opacity: 0;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-restart {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .btn-back {
            background-color: var(--card-bg);
            color: var(--text-color);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .game-status {
            margin: 1rem 0;
            font-size: 1.2rem;
            min-height: 2rem;
            text-align: center;
            animation: fadeIn 0.6s ease-out 1.2s forwards;
            opacity: 0;
        }

        .ai-thinking {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .ai-thinking.active {
            opacity: 1;
            pointer-events: all;
        }

        .ai-thinking-text {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        [dir="rtl"] {
            text-align: right;
        }

        [dir="ltr"] {
            text-align: left;
        }

        [dir="rtl"] .btn i {
            margin-left: 0.5rem;
        }

        [dir="ltr"] .btn i {
            margin-right: 0.5rem;
        }

        @media (max-width: 600px) {
            .players-info {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
            }

            .player {
                width: 90%;
            }

            .game-board {
                grid-template-columns: repeat(3, minmax(60px, 80px));
                grid-template-rows: repeat(3, minmax(60px, 80px));
            }
        }
    </style>
</head>

<body>
    <div class="bg-pattern"></div>

    <div class="container">
        <header>
            <h1 id="game-title">تيك تاك تو - ضد الذكاء الاصطناعي</h1>
        </header>

        <div class="difficulty-info">
            <p id="difficulty-text">مستوى الصعوبة: <span class="difficulty-level" id="difficulty-level">متوسط</span></p>
            <div class="difficulty-stars" id="difficulty-stars">★★☆☆</div>
            <p id="difficulty-desc">الذكاء الاصطناعي يلعب بذكاء أحياناً ويخطئ أحياناً أخرى!</p>
        </div>

        <div class="players-info">
            <div class="player player-human active" id="player-human">
                <div class="player-symbol">X</div>
                <div class="player-name" id="player-human-name">أنت</div>
                <div class="player-score" id="player-human-score">0</div>
            </div>

            <div class="player player-ai" id="player-ai">
                <div class="player-symbol">O</div>
                <div class="player-name" id="player-ai-name">الذكاء الاصطناعي</div>
                <div class="player-score" id="player-ai-score">0</div>
            </div>
        </div>

        <div class="game-status" id="game-status">دورك للعب</div>

        <div class="game-board" id="game-board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <button class="btn btn-restart" id="restart-btn">
                <i class="fas fa-redo"></i> <span id="restart-text">إعادة اللعب</span>
            </button>
            <a href="index.html" class="btn btn-back" id="back-btn">
                <i class="fas fa-home"></i> <span id="home-text">الصفحة الرئيسية</span>
            </a>
        </div>
    </div>

    <div class="ai-thinking" id="ai-thinking">
        <div class="ai-thinking-text" id="ai-thinking-text">الذكاء الاصطناعي يفكر...</div>
        <div class="loader"></div>
    </div>

    <script>
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        let scores = { human: 0, ai: 0 };
        let isAiThinking = false;

        const cells = document.querySelectorAll('.cell');
        const playerHuman = document.getElementById('player-human');
        const playerAi = document.getElementById('player-ai');
        const gameStatus = document.getElementById('game-status');
        const restartBtn = document.getElementById('restart-btn');
        const humanScore = document.getElementById('player-human-score');
        const aiScore = document.getElementById('player-ai-score');
        const aiThinking = document.getElementById('ai-thinking');
        const aiThinkingText = document.getElementById('ai-thinking-text');

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function initGame() {
            loadSettings();
            cells.forEach(cell => cell.addEventListener('click', handleCellClick));
            restartBtn.addEventListener('click', restartGame);
            updateGameStatus();
        }

        function loadSettings() {
            const darkModeEnabled = localStorage.getItem('darkMode') !== 'false';
            if (!darkModeEnabled) document.body.classList.add('light-mode');

            const savedLanguage = localStorage.getItem('language') || 'en';
            document.documentElement.lang = savedLanguage;
            document.documentElement.dir = savedLanguage === 'ar' ? 'rtl' : 'ltr';
            updateUITexts(savedLanguage);
        }

        function updateUITexts(lang) {
            const texts = {
                ar: {
                    title: "تيك تاك تو - ضد الذكاء الاصطناعي",
                    difficulty: "مستوى الصعوبة: ",
                    difficultyLevel: "متوسط",
                    difficultyStars: "★★☆☆",
                    difficultyDesc: "الذكاء الاصطناعي يلعب بذكاء أحياناً ويخطئ أحياناً أخرى!",
                    human: "أنت",
                    ai: "الذكاء الاصطناعي",
                    statusHuman: "دورك للعب",
                    statusAi: "الذكاء الاصطناعي يفكر...",
                    statusWinHuman: "لقد فزت! 🎉",
                    statusWinAi: "الذكاء الاصطناعي فاز!",
                    statusDraw: "تعادل!",
                    restart: "إعادة اللعب",
                    home: "الصفحة الرئيسية",
                    aiThinking: "الذكاء الاصطناعي يفكر..."
                },
                en: {
                    title: "Tic-Tac-Toe - VS AI",
                    difficulty: "Difficulty: ",
                    difficultyLevel: "Medium",
                    difficultyStars: "★★☆☆",
                    difficultyDesc: "AI plays smart sometimes and makes mistakes other times!",
                    human: "You",
                    ai: "AI",
                    statusHuman: "Your turn",
                    statusAi: "AI is thinking...",
                    statusWinHuman: "You win! 🎉",
                    statusWinAi: "AI wins!",
                    statusDraw: "It's a draw!",
                    restart: "Restart Game",
                    home: "Home Page",
                    aiThinking: "AI is thinking..."
                }
            };

            const t = texts[lang] || texts['ar'];
            document.getElementById('game-title').textContent = t.title;
            document.getElementById('difficulty-text').innerHTML = t.difficulty + '<span class="difficulty-level">' + t.difficultyLevel + '</span>';
            document.getElementById('difficulty-stars').textContent = t.difficultyStars;
            document.getElementById('difficulty-desc').textContent = t.difficultyDesc;
            document.getElementById('player-human-name').textContent = t.human;
            document.getElementById('player-ai-name').textContent = t.ai;
            document.getElementById('restart-text').textContent = t.restart;
            document.getElementById('home-text').textContent = t.home;
            aiThinkingText.textContent = t.aiThinking;

            if (gameActive) {
                gameStatus.textContent = currentPlayer === 'X' ? t.statusHuman : t.statusAi;
            }
        }

        function handleCellClick(e) {
            const clickedCellIndex = parseInt(e.target.getAttribute('data-index'));
            if (board[clickedCellIndex] !== '' || !gameActive || isAiThinking || currentPlayer !== 'X') return;

            makeMove(clickedCellIndex, 'X');
            checkResult();

            if (gameActive && currentPlayer === 'O') aiMove();
        }

        function makeMove(index, player) {
            board[index] = player;
            cells[index].textContent = player;
            cells[index].classList.add(player.toLowerCase());
        }

        // MEDIUM AI: 50% chance smart (win/block), 50% random
        function aiMove() {
            isAiThinking = true;
            aiThinking.classList.add('active');

            setTimeout(() => {
                const move = findMediumMove();
                makeMove(move, 'O');
                checkResult();

                isAiThinking = false;
                aiThinking.classList.remove('active');

                if (gameActive && currentPlayer === 'X') {
                    const lang = document.documentElement.lang;
                    gameStatus.textContent = lang === 'en' ? "Your turn" : "دورك للعب";
                }
            }, 600);
        }

        function findMediumMove() {
            // 50% chance: play smart (try to win or block)
            if (Math.random() < 0.5) {
                const smartMove = findSmartMove();
                if (smartMove !== -1) return smartMove;
            }
            // Otherwise: random move
            return findRandomMove();
        }

        function findSmartMove() {
            // Try to win
            const winMove = findWinningMove('O');
            if (winMove !== -1) return winMove;

            // Try to block player's win
            const blockMove = findWinningMove('X');
            if (blockMove !== -1) return blockMove;

            return -1;
        }

        function findWinningMove(player) {
            for (const [a, b, c] of winningConditions) {
                const line = [board[a], board[b], board[c]];
                const emptyCount = line.filter(v => v === '').length;
                const playerCount = line.filter(v => v === player).length;

                if (playerCount === 2 && emptyCount === 1) {
                    if (board[a] === '') return a;
                    if (board[b] === '') return b;
                    if (board[c] === '') return c;
                }
            }
            return -1;
        }

        function findRandomMove() {
            const emptySquares = board.reduce((acc, val, idx) => val === '' ? [...acc, idx] : acc, []);
            return emptySquares[Math.floor(Math.random() * emptySquares.length)];
        }

        function checkWinner() {
            for (const [a, b, c] of winningConditions) {
                if (board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
            }
            if (!board.includes('')) return 'draw';
            return null;
        }

        function checkResult() {
            const winner = checkWinner();
            const lang = document.documentElement.lang;
            const t = lang === 'en' ?
                { winHuman: "You win! 🎉", winAi: "AI wins!", draw: "It's a draw!" } :
                { winHuman: "لقد فزت! 🎉", winAi: "الذكاء الاصطناعي فاز!", draw: "تعادل!" };

            if (winner !== null) {
                gameActive = false;
                if (winner !== 'draw') {
                    const combo = getWinningCombo();
                    if (combo) combo.forEach(i => cells[i].classList.add('winner'));
                }
                if (winner === 'X') {
                    gameStatus.textContent = t.winHuman;
                    scores.human++;
                    humanScore.textContent = scores.human;
                } else if (winner === 'O') {
                    gameStatus.textContent = t.winAi;
                    scores.ai++;
                    aiScore.textContent = scores.ai;
                } else {
                    gameStatus.textContent = t.draw;
                }
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            updateCurrentPlayer();
        }

        function getWinningCombo() {
            for (const [a, b, c] of winningConditions) {
                if (board[a] && board[a] === board[b] && board[a] === board[c]) return [a, b, c];
            }
            return null;
        }

        function updateCurrentPlayer() {
            const lang = document.documentElement.lang;
            const t = lang === 'en' ?
                { statusHuman: "Your turn", statusAi: "AI is thinking..." } :
                { statusHuman: "دورك للعب", statusAi: "الذكاء الاصطناعي يفكر..." };

            if (currentPlayer === 'X') {
                gameStatus.textContent = t.statusHuman;
                playerHuman.classList.add('active');
                playerAi.classList.remove('active');
            } else {
                gameStatus.textContent = t.statusAi;
                playerHuman.classList.remove('active');
                playerAi.classList.add('active');
            }
        }

        function updateGameStatus() {
            const lang = document.documentElement.lang;
            gameStatus.textContent = currentPlayer === 'X' ?
                (lang === 'en' ? "Your turn" : "دورك للعب") :
                (lang === 'en' ? "AI is thinking..." : "الذكاء الاصطناعي يفكر...");
        }

        function restartGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            gameActive = true;
            currentPlayer = 'X';
            isAiThinking = false;
            aiThinking.classList.remove('active');

            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('x', 'o', 'winner');
            });

            playerHuman.classList.add('active');
            playerAi.classList.remove('active');
            updateGameStatus();
        }

        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>

</html>
