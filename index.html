<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe | Classic Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #3a86ff;
            --secondary-color: #8338ec;
            --accent-color: #ff006e;
            --light-color: #f8f9fa;
            --dark-color: #212529;
            --bg-color: #2b2d42;
            --text-color: #f8f9fa;
            --card-bg: rgba(255, 255, 255, 0.1);
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .light-mode {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --card-bg: rgba(0, 0, 0, 0.1);
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            position: relative;
            z-index: 1;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.2rem);
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, minmax(60px, 100px));
            grid-template-rows: repeat(3, minmax(60px, 100px));
            gap: 10px;
            margin: 2rem 0;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            animation: scaleIn 0.8s ease-out 0.3s both;
            width: 100%;
            max-width: 320px;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }

            to {
                transform: scale(0.9);
                opacity: 1;
            }
        }

        .game-board:hover {
            transform: scale(0.95);
        }

        .cell {
            width: 100%;
            height: 100%;
            aspect-ratio: 1/1;
            background-color: var(--card-bg);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(2rem, 8vw, 3rem);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .cell:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .cell:hover::before {
            transform: translateX(100%);
        }

        .cell.x::after {
            content: 'X';
            color: var(--primary-color);
            font-weight: bold;
        }

        .cell.o::after {
            content: 'O';
            color: var(--accent-color);
            font-weight: bold;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
            animation: fadeInUp 1s ease-out 0.5s both;
            width: 100%;
            max-width: 700px;
            padding: 0 1rem;
        }

        /* ===== AI Level Modal ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal-card {
            background: rgba(30, 32, 50, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 2rem 1.5rem;
            width: min(90vw, 380px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            transform: scale(0.85) translateY(20px);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
            opacity: 0;
            position: relative;
        }

        .light-mode .modal-card {
            background: rgba(240, 242, 255, 0.95);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .modal-overlay.open .modal-card {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .modal-close {
            position: absolute;
            top: 0.8rem;
            inset-inline-end: 0.9rem;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-color);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-title {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-color);
            opacity: 0.9;
        }

        .modal-levels {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .level-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1.2rem;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
        }

        .level-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: translateX(-100%);
            transition: transform 0.4s ease;
        }

        .level-btn:hover::before {
            transform: translateX(100%);
        }

        .level-btn:hover {
            transform: translateX(4px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
        }

        .level-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .level-info {
            flex: 1;
        }

        .level-name {
            font-size: 1rem;
            font-weight: 700;
        }

        .level-desc {
            font-size: 0.75rem;
            opacity: 0.8;
            margin-top: 0.1rem;
        }

        .level-stars {
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .level-easy {
            background: linear-gradient(135deg, #1a7a3a, #2dc653);
            color: white;
        }

        .level-medium {
            background: linear-gradient(135deg, #a07000, #f9c74f);
            color: #1a1000;
        }

        .level-hard {
            background: linear-gradient(135deg, #b84300, #f77f00);
            color: white;
        }

        .level-expert {
            background: linear-gradient(135deg, #8338ec, #ff006e);
            color: white;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            padding: 1rem 2rem;
            font-size: clamp(1rem, 3vw, 1.1rem);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            min-width: 200px;
            max-width: 250px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .btn:hover::before {
            transform: translateX(100%);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(45deg, var(--accent-color), #fb5607);
            color: white;
        }

        .btn-light {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            backdrop-filter: blur(10px);
        }

        .light-mode .btn-light {
            background: rgba(0, 0, 0, 0.1);
            color: var(--text-color);
        }

        .btn i {
            font-size: 1.2rem;
        }

        /* Animation for the X and O in the demo board */
        .cell:nth-child(1)::after,
        .cell:nth-child(5)::after,
        .cell:nth-child(9)::after {
            content: 'X';
            color: var(--primary-color);
            font-weight: bold;
            animation: popIn 0.5s ease-out 1.2s both;
        }

        .cell:nth-child(3)::after,
        .cell:nth-child(7)::after {
            content: 'O';
            color: var(--accent-color);
            font-weight: bold;
            animation: popIn 0.5s ease-out 1.5s both;
        }

        @keyframes popIn {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Glow effect for the winning combination */
        .cell:nth-child(1),
        .cell:nth-child(5),
        .cell:nth-child(9) {
            animation: glow 2s ease-in-out infinite alternate 1.8s;
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 5px rgba(58, 134, 255, 0.5);
            }

            to {
                box-shadow: 0 0 20px rgba(58, 134, 255, 0.8);
            }
        }

        /* RTL/LTR styles */
        [dir="rtl"] {
            text-align: right;
        }

        [dir="ltr"] {
            text-align: left;
        }

        [dir="rtl"] .btn i {
            margin-left: 0.5rem;
        }

        [dir="ltr"] .btn i {
            margin-right: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <header>
            <h1 id="main-title">تيك تاك تو</h1>
            <p class="subtitle" id="subtitle-text">لعبة الاستراتيجية الكلاسيكية التي لا تشيخ. تحدى صديقك أو اختبر
                مهاراتك ضد الذكاء الاصطناعي.</p>
        </header>

        <div class="game-board">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>

        <div class="buttons">
            <a href="start.html" class="btn btn-primary" id="friend-btn">
                <i class="fas fa-user-friends"></i> <span id="friend-text">اللعب ضد صديق</span>
            </a>
            <button class="btn btn-secondary" id="ai-btn" onclick="openModal()">
                <i class="fas fa-robot"></i> <span id="ai-text">اللعب ضد الذكاء الاصطناعي</span>
            </button>
            <a href="settings.html" class="btn btn-light" id="settings-btn">
                <i class="fas fa-cog"></i> <span id="settings-text">الإعدادات</span>
            </a>
        </div>

        <!-- AI Difficulty Modal -->
        <div class="modal-overlay" id="ai-modal" onclick="handleOverlayClick(event)">
            <div class="modal-card">
                <button class="modal-close" onclick="closeModal()" aria-label="close">✕</button>
                <p class="modal-title" id="modal-title">اختر مستوى الصعوبة</p>
                <div class="modal-levels">
                    <a href="starting_against_ai_easy.html" class="level-btn level-easy">
                        <div class="level-icon"><i class="fas fa-leaf"></i></div>
                        <div class="level-info">
                            <div class="level-name" id="easy-text">سهل</div>
                            <div class="level-desc" id="easy-desc">حركات عشوائية</div>
                        </div>
                        <span class="level-stars" id="easy-stars">★☆☆☆</span>
                    </a>
                    <a href="starting_against_ai_mid.html" class="level-btn level-medium">
                        <div class="level-icon"><i class="fas fa-brain"></i></div>
                        <div class="level-info">
                            <div class="level-name" id="mid-text">متوسط</div>
                            <div class="level-desc" id="mid-desc">يخطئ أحياناً</div>
                        </div>
                        <span class="level-stars" id="mid-stars">★★☆☆</span>
                    </a>
                    <a href="starting_against_ai_hard.html" class="level-btn level-hard">
                        <div class="level-icon"><i class="fas fa-fire"></i></div>
                        <div class="level-info">
                            <div class="level-name" id="hard-text">صعب</div>
                            <div class="level-desc" id="hard-desc">ذكي جداً</div>
                        </div>
                        <span class="level-stars" id="hard-stars">★★★☆</span>
                    </a>
                    <a href="starting_against_ai_expert.html" class="level-btn level-expert">
                        <div class="level-icon"><i class="fas fa-skull"></i></div>
                        <div class="level-info">
                            <div class="level-name" id="expert-text">خبير</div>
                            <div class="level-desc" id="expert-desc">لا يُهزم أبداً!</div>
                        </div>
                        <span class="level-stars" id="expert-stars">★★★★</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Create floating particles
        document.addEventListener('DOMContentLoaded', function () {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');

                // Random position
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;

                // Random size
                const size = Math.random() * 3 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;

                // Random opacity
                particle.style.opacity = Math.random() * 0.5 + 0.1;

                // Random animation duration and delay
                const duration = Math.random() * 10 + 10;
                const delay = Math.random() * 5;
                particle.style.animation = `float ${duration}s infinite ${delay}s linear`;

                particlesContainer.appendChild(particle);
            }

            // Add hover effect to game board cells
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.addEventListener('mouseenter', function () {
                    if (!this.classList.contains('x') && !this.classList.contains('o')) {
                        this.style.transform = 'translateY(-5px)';
                        this.style.boxShadow = '0 10px 20px rgba(0, 0, 0, 0.2)';
                    }
                });

                cell.addEventListener('mouseleave', function () {
                    if (!this.classList.contains('x') && !this.classList.contains('o')) {
                        this.style.transform = '';
                        this.style.boxShadow = '';
                    }
                });
            });

            // Load settings
            loadSettings();
        });

        // Modal control
        function openModal() {
            document.getElementById('ai-modal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('ai-modal').classList.remove('open');
            document.body.style.overflow = '';
        }

        function handleOverlayClick(e) {
            if (e.target === document.getElementById('ai-modal')) closeModal();
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // Load and apply settings
        function loadSettings() {
            // Dark Mode
            const darkModeEnabled = localStorage.getItem('darkMode') !== 'false';
            if (!darkModeEnabled) {
                document.body.classList.add('light-mode');
            }

            // Language
            const savedLanguage = localStorage.getItem('language') || 'en';
            document.documentElement.lang = savedLanguage;
            document.documentElement.dir = savedLanguage === 'ar' ? 'rtl' : 'ltr';

            // Update UI texts
            updateUITexts(savedLanguage);
        }

        // Update UI texts based on language
        function updateUITexts(lang) {
            const texts = {
                ar: {
                    title: "تيك تاك تو",
                    subtitle: "لعبة الاستراتيجية الكلاسيكية التي لا تشيخ. تحدى صديقك أو اختبر مهاراتك ضد الذكاء الاصطناعي.",
                    friend: "اللعب ضد صديق",
                    ai: "اللعب ضد الذكاء الاصطناعي",
                    settings: "الإعدادات",
                    modalTitle: "اختر مستوى الصعوبة",
                    easy: "سهل", easyDesc: "حركات عشوائية",
                    mid: "متوسط", midDesc: "يخطئ أحياناً",
                    hard: "صعب", hardDesc: "ذكي جداً",
                    expert: "خبير", expertDesc: "لا يُهزم أبداً!"
                },
                en: {
                    title: "Tic-Tac-Toe",
                    subtitle: "The classic strategy game that never gets old. Challenge a friend or test your skills against AI.",
                    friend: "Play vs Friend",
                    ai: "Play vs AI",
                    settings: "Settings",
                    modalTitle: "Choose Difficulty",
                    easy: "Easy", easyDesc: "Random moves",
                    mid: "Medium", midDesc: "Makes mistakes",
                    hard: "Hard", hardDesc: "Very smart",
                    expert: "Expert", expertDesc: "Unbeatable!"
                }
            };

            const t = texts[lang] || texts['ar'];

            document.getElementById('main-title').textContent = t.title;
            document.getElementById('subtitle-text').textContent = t.subtitle;
            document.getElementById('friend-text').textContent = t.friend;
            document.getElementById('ai-text').textContent = t.ai;
            document.getElementById('settings-text').textContent = t.settings;
            document.getElementById('modal-title').textContent = t.modalTitle;
            document.getElementById('easy-text').textContent = t.easy;
            document.getElementById('easy-desc').textContent = t.easyDesc;
            document.getElementById('mid-text').textContent = t.mid;
            document.getElementById('mid-desc').textContent = t.midDesc;
            document.getElementById('hard-text').textContent = t.hard;
            document.getElementById('hard-desc').textContent = t.hardDesc;
            document.getElementById('expert-text').textContent = t.expert;
            document.getElementById('expert-desc').textContent = t.expertDesc;
        }
    </script>
</body>

</html>
